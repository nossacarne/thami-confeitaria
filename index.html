<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d81b60">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3142/3142690.png">
    
    <title>Precificação Inteligente</title>
    <style>
        :root {
            --primary: #d81b60;
            --primary-dark: #ad144b;
            --secondary: #2e7d32;
            --background: #fdf0f5;
            --surface: #ffffff;
            --text: #333333;
            --border: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h2 { text-align: center; color: var(--primary); margin-top: 0; margin-bottom: 25px;}
        
        .form-group { margin-bottom: 16px; }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 0.9em;
            color: #555;
        }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1em; 
            transition: border-color 0.3s;
            background-color: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-com-unidade {
            display: flex;
            gap: 5px;
        }

        .input-com-unidade input { flex: 2; }
        .input-com-unidade select { flex: 1; padding: 12px 5px; text-align: center;}
        
        button {
            width: 100%; 
            color: white; 
            padding: 14px; 
            border: none;
            border-radius: 10px; 
            font-size: 1.05em; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }
        
        .btn-busca { background-color: #1976d2; margin-top: 8px; font-size: 0.9em; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-busca:disabled { background-color: #9e9e9e; cursor: not-allowed; }
        .btn-add { background-color: var(--primary); margin-top: 15px; }

        .status-msg {
            display: none;
            font-size: 0.85em;
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
        }

        .divider { height: 1px; background-color: var(--border); margin: 25px 0; }
        
        .item-lista { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px dashed var(--border); 
        }
        .item-detalhe { display: flex; flex-direction: column; }
        .item-nome { font-weight: 600; font-size: 1.05em; }
        .item-peso { font-size: 0.85em; color: #777; margin-top: 2px;}
        .item-valor { font-weight: bold; color: var(--primary); font-size: 1.1em;}
        
        .total-container { 
            margin-top: 25px; padding: 20px; 
            background-color: #f1f8e9; border-radius: 12px; 
            text-align: right; border: 1px solid #c8e6c9;
        }
        .total-texto { font-size: 1.4em; font-weight: 800; color: var(--secondary); display: block; margin-top: 5px;}
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Nova Encomenda</h2>

    <form id="formIngrediente">
        <div class="form-group">
            <label for="nome">Ingrediente</label>
            <input type="text" id="nome" placeholder="Ex: Leite Condensado" required>
            
            <button type="button" class="btn-busca" id="btnBuscarOnline">
                <span>🤖 Buscar Preço Automático</span>
            </button>
            <div id="statusBusca" class="status-msg"></div>
        </div>

        <div style="display: flex; gap: 12px;">
            <div class="form-group" style="flex: 1;">
                <label for="pesoEmbalagem">Tamanho da Embalagem</label>
                <div class="input-com-unidade">
                    <input type="number" id="pesoEmbalagem" step="0.01" placeholder="Ex: 1 ou 395" required>
                    <select id="unidadeEmbalagem">
                        <option value="g">g / ml</option>
                        <option value="kg">Kg / L</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="precoPago">Preço Pago (R$)</label>
                <input type="number" id="precoPago" step="0.01" placeholder="Ex: 6.50" required>
            </div>
        </div>

        <div class="form-group">
            <label for="pesoReceita">Quantidade na Receita</label>
            <div class="input-com-unidade">
                <input type="number" id="pesoReceita" step="0.01" placeholder="Ex: 150" required>
                <select id="unidadeReceita">
                    <option value="g">g / ml</option>
                    <option value="kg">Kg / L</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-add">➕ Adicionar à Receita</button>
    </form>

    <div class="divider"></div>
    
    <h3 style="font-size: 1.1em; color: #555; margin-bottom: 15px;">Ficha Técnica:</h3>
    <div id="listaIngredientes"></div>
    
    <div class="total-container">
        <span style="color: #555; font-size: 0.9em; font-weight: 600; text-transform: uppercase;">Custo Total da Produção</span>
        <span class="total-texto" id="valorTotal">R$ 0,00</span>
    </div>
</div>

<script>
    let listaDeCusto = [];
    let custoTotal = 0;

    const btnBuscar = document.getElementById('btnBuscarOnline');
    const inputNome = document.getElementById('nome');
    const inputPreco = document.getElementById('precoPago');
    const statusBusca = document.getElementById('statusBusca');

    btnBuscar.addEventListener('click', async () => {
        const ingrediente = inputNome.value.trim();
        
        if (!ingrediente) {
            mostrarStatus('⚠️ Digite o nome do ingrediente primeiro!', '#fff3e0', '#e65100');
            inputNome.focus();
            return;
        }

        btnBuscar.disabled = true;
        mostrarStatus('⏳ Conectando ao Mercado Livre...', '#e3f2fd', '#1565c0');

        try {
            // 🔥 A GRANDE MÁGICA: O celular consulta a API oficial diretamente! Sem intermediários.
            const urlAPI = `https://api.mercadolibre.com/sites/MLB/search?q=${encodeURIComponent(ingrediente)}`;
            const resposta = await fetch(urlAPI);
            const dados = await resposta.json();

            // Verifica se a busca trouxe resultados
            if (dados.results && dados.results.length > 0) {
                const precoExato = dados.results[0].price; // Pega o preço do primeiro item
                inputPreco.value = precoExato;
                mostrarStatus(`✅ Sucesso! Preço sugerido: R$ ${precoExato}`, '#e8f5e9', '#2e7d32');
            } else {
                mostrarStatus('❌ Preço não encontrado. Digite manualmente.', '#ffebee', '#c62828');
            }
        } catch (erro) {
            mostrarStatus('🔌 Erro ao conectar com o Mercado Livre.', '#ffebee', '#c62828');
            console.error(erro);
        } finally {
            btnBuscar.disabled = false;
        }
    });

    function mostrarStatus(mensagem, corFundo, corTexto) {
        statusBusca.style.display = 'block';
        statusBusca.style.backgroundColor = corFundo;
        statusBusca.style.color = corTexto;
        statusBusca.innerText = mensagem;
    }

    const form = document.getElementById('formIngrediente');
    const listaHTML = document.getElementById('listaIngredientes');
    const valorTotalHTML = document.getElementById('valorTotal');

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        const nome = document.getElementById('nome').value;
        const precoPago = parseFloat(document.getElementById('precoPago').value);
        
        let pesoEmbalagem = parseFloat(document.getElementById('pesoEmbalagem').value);
        const unidadeEmbalagem = document.getElementById('unidadeEmbalagem').value;
        
        let pesoReceita = parseFloat(document.getElementById('pesoReceita').value);
        const unidadeReceita = document.getElementById('unidadeReceita').value;

        // Conversão automática
        if (unidadeEmbalagem === 'kg') pesoEmbalagem = pesoEmbalagem * 1000;
        if (unidadeReceita === 'kg') pesoReceita = pesoReceita * 1000;

        const custoPorGrama = precoPago / pesoEmbalagem;
        const custoNaReceita = custoPorGrama * pesoReceita;

        const textoFacaoUsada = `${document.getElementById('pesoReceita').value}${unidadeReceita}`;

        listaDeCusto.push({ nome, fracaoUsada: textoFacaoUsada, custoCalculado: custoNaReceita });
        custoTotal += custoNaReceita;

        renderizarLista();
        
        form.reset();
        statusBusca.style.display = 'none';
        document.getElementById('nome').focus();
    });

    function renderizarLista() {
        listaHTML.innerHTML = '';
        listaDeCusto.forEach(item => {
            const valorFormatado = item.custoCalculado.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const divItem = document.createElement('div');
            divItem.className = 'item-lista';
            divItem.innerHTML = `
                <div class="item-detalhe">
                    <span class="item-nome">${item.nome}</span>
                    <span class="item-peso">Fração usada: ${item.fracaoUsada}</span>
                </div>
                <div class="item-valor">${valorFormatado}</div>
            `;
            listaHTML.appendChild(divItem);
        });
        valorTotalHTML.innerText = custoTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
</script>

</body>
</html>
