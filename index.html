<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d81b60">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3142/3142690.png">
    <title>Precificação Inteligente</title>
    <style>
        :root { --primary: #d81b60; --background: #fdf0f5; --surface: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--background); padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--surface); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 1em; }
        .btn-busca { background-color: #1976d2; color: white; margin-top: 8px; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-add { background-color: var(--primary); color: white; margin-top: 15px; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; }
        .divider { height: 1px; background-color: #e0e0e0; margin: 25px 0; }
        .item-lista { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .total-container { margin-top: 25px; padding: 20px; background-color: #f1f8e9; border-radius: 12px; text-align: right; }
        .total-texto { font-size: 1.4em; font-weight: 800; color: #2e7d32; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Precificação Thami</h2>

    <form id="formIngrediente">
        <div class="form-group">
            <label>Ingrediente</label>
            <input type="text" id="nome" placeholder="Ex: Leite Condensado Moça" required>
            <button type="button" class="btn-busca" onclick="consultarPreco()">🔍 Ver Preços no Google</button>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Embalagem (Peso)</label>
                <input type="number" id="pesoEmbalagem" step="0.01" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Preço Pago (R$)</label>
                <input type="number" id="precoPago" step="0.01" placeholder="0.00" required>
            </div>
        </div>

        <div class="form-group">
            <label>Uso na Receita</label>
            <input type="number" id="pesoReceita" step="0.01" required>
        </div>

        <button type="submit" class="btn-add">➕ Adicionar à Lista</button>
    </form>

    <div class="divider"></div>
    <div id="listaIngredientes"></div>
    
    <div class="total-container">
        <span>CUSTO TOTAL:</span>
        <span class="total-texto" id="valorTotal">R$ 0,00</span>
    </div>
</div>

<script>
    let total = 0;

    // A SOLUÇÃO INFALÍVEL: Abre a pesquisa pronta para ela ver o preço e voltar
    function consultarPreco() {
        const item = document.getElementById('nome').value;
        if (!item) return alert("Digite o nome do ingrediente!");
        
        // Abre o Google Shopping com o item já digitado
        const url = `https://www.google.com.br/search?tbm=shop&q=${encodeURIComponent(item)}`;
        window.open(url, '_blank');
    }

    document.getElementById('formIngrediente').addEventListener('submit', function(e) {
        e.preventDefault();
        const nome = document.getElementById('nome').value;
        const preco = parseFloat(document.getElementById('precoPago').value);
        const embalagem = parseFloat(document.getElementById('pesoEmbalagem').value);
        const uso = parseFloat(document.getElementById('pesoReceita').value);

        const custoItem = (preco / embalagem) * uso;
        total += custoItem;

        const lista = document.getElementById('listaIngredientes');
        lista.innerHTML += `
            <div class="item-lista">
                <span>${nome} (${uso}g)</span>
                <b>R$ ${custoItem.toFixed(2)}</b>
            </div>
        `;

        document.getElementById('valorTotal').innerText = `R$ ${total.toFixed(2)}`;
        this.reset();
    });
</script>

</body>
</html>
